<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --panel: #1c1c1c;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent-dim: #9ab82a;
      --text: #f0f0f0;
      --muted: #666;
      --btn-num: #1f1f1f;
      --btn-op: #252525;
      --btn-eq: var(--accent);
      --shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .calc-wrapper {
      position: relative;
      animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .calc {
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(200,241,53,0.05) inset;
      overflow: hidden;
      position: relative;
    }

    /* Accent glow top */
    .calc::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 2px;
      background: var(--accent);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 0 20px 4px rgba(200,241,53,0.25);
    }

    /* Display */
    .display {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
      position: relative;
    }

    .history {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      min-height: 16px;
      transition: opacity 0.2s;
      text-align: right;
      word-break: break-all;
    }

    .main-display {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
      transition: font-size 0.15s ease;
      word-break: break-all;
      text-align: right;
      max-width: 100%;
    }

    .main-display.small { font-size: 28px; }
    .main-display.xsmall { font-size: 20px; }

    /* Flash effect on equals */
    .display.flash { animation: flash 0.25s ease; }
    @keyframes flash {
      0%   { background: rgba(200,241,53,0.08); }
      100% { background: var(--panel); }
    }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .btn {
      background: var(--btn-num);
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      padding: 0;
      height: 72px;
      cursor: pointer;
      transition: background 0.1s, transform 0.08s, color 0.1s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -0.02em;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ripple */
    .btn::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.06);
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .btn:active::after {
      transform: scale(1);
      opacity: 1;
      transition: 0s;
    }

    .btn:active { transform: scale(0.95); }

    /* Operator buttons */
    .btn.op {
      background: var(--btn-op);
      color: var(--accent);
      font-size: 18px;
    }

    /* Special: clear, sign, percent */
    .btn.fn {
      background: var(--btn-op);
      color: #aaa;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    /* Equals */
    .btn.eq {
      background: var(--btn-eq);
      color: #000;
      font-size: 22px;
      font-weight: 700;
    }
    .btn.eq:hover { background: var(--accent-dim); }

    /* Zero spans 2 cols */
    .btn.zero {
      grid-column: span 2;
      justify-content: flex-start;
      padding-left: 28px;
    }

    /* Last row rounded corners */
    .btn:nth-last-child(1) { border-radius: 0 0 20px 0; }
    .btn:nth-last-child(4) { border-radius: 0 0 0 20px; }

    .btn:hover:not(.eq) { background: #252525; }
    .btn.op:hover { background: #2e2e2e; }
    .btn.fn:hover { background: #2e2e2e; color: #ccc; }

    /* Active operator highlight */
    .btn.op.active {
      background: var(--accent);
      color: #000;
    }

    /* Label */
    .calc-label {
      text-align: center;
      margin-bottom: 14px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="calc-wrapper">
  <p class="calc-label">Calculator</p>
  <div class="calc">
    <div class="display" id="display">
      <div class="history" id="history"></div>
      <div class="main-display" id="mainDisplay">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn fn" id="btnClear">AC</button>
      <button class="btn fn" onclick="toggleSign()">+/−</button>
      <button class="btn fn" onclick="percent()">%</button>
      <button class="btn op" data-op="÷">÷</button>
      <!-- Row 2 -->
      <button class="btn" onclick="input('7')">7</button>
      <button class="btn" onclick="input('8')">8</button>
      <button class="btn" onclick="input('9')">9</button>
      <button class="btn op" data-op="×">×</button>
      <!-- Row 3 -->
      <button class="btn" onclick="input('4')">4</button>
      <button class="btn" onclick="input('5')">5</button>
      <button class="btn" onclick="input('6')">6</button>
      <button class="btn op" data-op="−">−</button>
      <!-- Row 4 -->
      <button class="btn" onclick="input('1')">1</button>
      <button class="btn" onclick="input('2')">2</button>
      <button class="btn" onclick="input('3')">3</button>
      <button class="btn op" data-op="+">+</button>
      <!-- Row 5 -->
      <button class="btn zero" onclick="input('0')">0</button>
      <button class="btn" onclick="inputDot()">.</button>
      <button class="btn eq" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let current = '0';
  let previous = '';
  let operator = null;
  let shouldResetScreen = false;
  let justCalculated = false;

  const mainDisplay = document.getElementById('mainDisplay');
  const historyEl = document.getElementById('history');
  const displayEl = document.getElementById('display');
  const clearBtn = document.getElementById('btnClear');
  const opBtns = document.querySelectorAll('.btn.op');

  function updateDisplay(val) {
    mainDisplay.textContent = val;
    const len = val.toString().length;
    mainDisplay.className = 'main-display';
    if (len > 12) mainDisplay.classList.add('xsmall');
    else if (len > 8) mainDisplay.classList.add('small');
    clearBtn.textContent = (val === '0' && !previous) ? 'AC' : 'C';
  }

  function highlightOp(op) {
    opBtns.forEach(b => b.classList.remove('active'));
    if (op) {
      opBtns.forEach(b => { if (b.dataset.op === op) b.classList.add('active'); });
    }
  }

  function input(digit) {
    if (shouldResetScreen) { current = digit; shouldResetScreen = false; }
    else {
      if (current === '0' && digit !== '.') current = digit;
      else if (current.length < 12) current += digit;
    }
    justCalculated = false;
    updateDisplay(current);
  }

  function inputDot() {
    if (shouldResetScreen) { current = '0.'; shouldResetScreen = false; }
    else if (!current.includes('.')) current += '.';
    justCalculated = false;
    updateDisplay(current);
  }

  function setOperator(op) {
    if (operator && !shouldResetScreen) calculate(true);
    previous = current;
    operator = op;
    shouldResetScreen = true;
    justCalculated = false;
    historyEl.textContent = `${previous} ${op}`;
    highlightOp(op);
  }

  function calculate(chaining = false) {
    if (!operator || !previous) return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let result;
    switch(operator) {
      case '+': result = a + b; break;
      case '−': result = a - b; break;
      case '×': result = a * b; break;
      case '÷': result = b !== 0 ? a / b : 'Error'; break;
    }
    const expr = `${previous} ${operator} ${current}`;
    if (!chaining) {
      historyEl.textContent = `${expr} =`;
      displayEl.classList.add('flash');
      setTimeout(() => displayEl.classList.remove('flash'), 250);
      operator = null;
      highlightOp(null);
      justCalculated = true;
    }
    current = result === 'Error' ? 'Error' : formatResult(result);
    shouldResetScreen = true;
    updateDisplay(current);
    return result;
  }

  function formatResult(n) {
    if (Number.isInteger(n)) return n.toString();
    let s = parseFloat(n.toPrecision(12)).toString();
    return s.length > 12 ? parseFloat(n.toFixed(8)).toString() : s;
  }

  function clearAll() {
    if (clearBtn.textContent === 'AC') {
      current = '0'; previous = ''; operator = null;
      historyEl.textContent = ''; highlightOp(null);
    } else {
      current = '0';
      clearBtn.textContent = 'AC';
    }
    shouldResetScreen = false;
    justCalculated = false;
    updateDisplay(current);
  }

  function toggleSign() {
    if (current === '0' || current === 'Error') return;
    current = (parseFloat(current) * -1).toString();
    updateDisplay(current);
  }

  function percent() {
    if (current === 'Error') return;
    current = (parseFloat(current) / 100).toString();
    updateDisplay(current);
  }

  // Wire clear button
  clearBtn.addEventListener('click', clearAll);

  // Wire operator buttons
  opBtns.forEach(btn => {
    btn.addEventListener('click', () => setOperator(btn.dataset.op));
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOperator('+');
    else if (e.key === '-') setOperator('−');
    else if (e.key === '*') setOperator('×');
    else if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay(current);
    }
    else if (e.key === '%') percent();
  });

  updateDisplay('0');
</script>
</body>
</html>
